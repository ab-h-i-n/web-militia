<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#000000" />
    <title>Web-Militia</title>
    <link rel="icon" type="image/webp" href="/images/app_icon.webp" />
    <link rel="apple-touch-icon" href="/images/app_icon.webp" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="game"></div>

    <!-- Rotate-device prompt (shown when window is portrait) -->
    <div id="rotate-overlay" hidden>
      <div class="rotate-overlay__content">
        <div class="rotate-overlay__icon" aria-hidden="true">
          <svg viewBox="0 0 64 64" width="96" height="96" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <rect x="8" y="18" width="48" height="28" rx="4" />
            <path d="M20 52l-4 4M44 52l4 4" />
            <path d="M32 8a18 18 0 0 1 16 10" />
            <path d="M50 14l-2 6-6-2" />
          </svg>
        </div>
        <p class="rotate-overlay__text">Please rotate your device to landscape</p>
      </div>
    </div>

    <!-- Fullscreen toggle (hidden when in fullscreen) -->
    <button id="fullscreen-btn" type="button" hidden aria-label="Enter fullscreen" title="Enter fullscreen">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5" />
      </svg>
    </button>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
